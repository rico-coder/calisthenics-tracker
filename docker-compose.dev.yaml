services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: calisthenics-tracker
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: